<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4d4d4d"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #333333; }
      .box { fill: #ffffff; stroke: #4d4d4d; stroke-width: 1.4; }
      .input { fill: #f9f9f9; stroke: #4d4d4d; stroke-width: 1.4; }
      .group { fill: none; stroke: #777777; stroke-width: 1.2; stroke-dasharray: 5 4; }
      .output { fill: #f5f5f5; stroke: #4d4d4d; stroke-width: 1.4; }
      .arrow { stroke: #4d4d4d; stroke-width: 1.3; fill: none; marker-end: url(#arrow); }
      .dash-arrow { stroke: #4d4d4d; stroke-width: 1.3; fill: none; stroke-dasharray: 5 4; marker-end: url(#arrow); }
      .label { font-size: 16px; font-weight: 600; }
      .small { font-size: 15px; }
      .caption { font-size: 16px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1200" height="700" fill="#ffffff"/>

  <text x="60" y="48" class="label">Data inputs</text>
  <rect x="60" y="70" width="175" height="62" class="input"/>
  <text x="147.5" y="96" text-anchor="middle" class="small">MPS LSOA</text>
  <text x="147.5" y="116" text-anchor="middle" class="small">Crime 2021</text>

  <rect x="315" y="70" width="175" height="62" class="input"/>
  <text x="402.5" y="96" text-anchor="middle" class="small">ONS LSOA-to-</text>
  <text x="402.5" y="116" text-anchor="middle" class="small">MSOA Lookup</text>

  <rect x="570" y="70" width="175" height="62" class="input"/>
  <text x="657.5" y="96" text-anchor="middle" class="small">Census 2021</text>
  <text x="657.5" y="116" text-anchor="middle" class="small">MSOA Features</text>

  <rect x="825" y="70" width="175" height="62" class="input"/>
  <text x="912.5" y="96" text-anchor="middle" class="small">MSOA 2021</text>
  <text x="912.5" y="116" text-anchor="middle" class="small">Boundary Data</text>

  <rect x="45" y="185" width="1110" height="225" class="group"/>
  <text x="65" y="215" class="label">Data preparation</text>

  <rect x="75" y="250" width="170" height="62" class="box"/>
  <text x="160" y="276" text-anchor="middle" class="small">Annual LSOA</text>
  <text x="160" y="296" text-anchor="middle" class="small">Crime Counts</text>

  <rect x="305" y="250" width="175" height="62" class="box"/>
  <text x="392.5" y="276" text-anchor="middle" class="small">Aggregate Crime</text>
  <text x="392.5" y="296" text-anchor="middle" class="small">to MSOA</text>

  <rect x="540" y="250" width="190" height="62" class="box"/>
  <text x="635" y="276" text-anchor="middle" class="small">Crime Rate per</text>
  <text x="635" y="296" text-anchor="middle" class="small">1,000 Residents</text>

  <rect x="795" y="250" width="185" height="62" class="box"/>
  <text x="887.5" y="276" text-anchor="middle" class="small">Top 25%</text>
  <text x="887.5" y="296" text-anchor="middle" class="small">High_Risk Label</text>

  <rect x="405" y="335" width="260" height="62" class="box"/>
  <text x="535" y="361" text-anchor="middle" class="small">Merge Outcome with</text>
  <text x="535" y="381" text-anchor="middle" class="small">Selected Census Variables</text>

  <rect x="45" y="445" width="1110" height="120" class="group"/>
  <text x="65" y="475" class="label">Classification and evaluation</text>

  <rect x="90" y="500" width="180" height="54" class="box"/>
  <text x="180" y="522" text-anchor="middle" class="small">Stratified</text>
  <text x="180" y="542" text-anchor="middle" class="small">Train/Test Split</text>

  <rect x="345" y="500" width="180" height="54" class="box"/>
  <text x="435" y="522" text-anchor="middle" class="small">Logistic</text>
  <text x="435" y="542" text-anchor="middle" class="small">Regression</text>

  <rect x="590" y="500" width="180" height="54" class="box"/>
  <text x="680" y="522" text-anchor="middle" class="small">Random</text>
  <text x="680" y="542" text-anchor="middle" class="small">Forest</text>

  <rect x="835" y="500" width="190" height="54" class="box"/>
  <text x="930" y="522" text-anchor="middle" class="small">Precision, Recall</text>
  <text x="930" y="542" text-anchor="middle" class="small">and F1-score</text>

  <rect x="95" y="615" width="210" height="58" rx="12" class="output"/>
  <text x="200" y="638" text-anchor="middle" class="small">Choropleth Map</text>
  <text x="200" y="658" text-anchor="middle" class="small">(Red = High Risk)</text>

  <rect x="470" y="615" width="210" height="58" rx="12" class="output"/>
  <text x="575" y="638" text-anchor="middle" class="small">Feature</text>
  <text x="575" y="658" text-anchor="middle" class="small">Interpretation</text>

  <rect x="830" y="615" width="230" height="58" rx="12" class="output"/>
  <text x="945" y="638" text-anchor="middle" class="small">Model Comparison</text>
  <text x="945" y="658" text-anchor="middle" class="small">and Discussion</text>

  <line x1="147.5" y1="132" x2="160" y2="250" class="arrow"/>
  <line x1="402.5" y1="132" x2="392.5" y2="250" class="arrow"/>
  <line x1="657.5" y1="132" x2="535" y2="335" class="arrow"/>
  <line x1="912.5" y1="132" x2="200" y2="615" class="dash-arrow"/>

  <line x1="245" y1="281" x2="305" y2="281" class="arrow"/>
  <line x1="480" y1="281" x2="540" y2="281" class="arrow"/>
  <line x1="730" y1="281" x2="795" y2="281" class="arrow"/>
  <line x1="887.5" y1="312" x2="535" y2="335" class="arrow"/>
  <line x1="535" y1="397" x2="180" y2="500" class="arrow"/>

  <line x1="270" y1="527" x2="345" y2="527" class="arrow"/>
  <line x1="525" y1="527" x2="590" y2="527" class="arrow"/>
  <line x1="770" y1="527" x2="835" y2="527" class="arrow"/>
  <line x1="930" y1="554" x2="945" y2="615" class="arrow"/>
  <line x1="887.5" y1="312" x2="200" y2="615" class="arrow"/>
  <line x1="435" y1="554" x2="575" y2="615" class="arrow"/>
  <line x1="680" y1="554" x2="575" y2="615" class="arrow"/>

  <text x="600" y="692" text-anchor="middle" class="caption">Fig. 1. Research flow chart.</text>
</svg>
